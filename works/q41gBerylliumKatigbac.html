<!DOCTYPE html>
<html>
<head>
    <title>Add a Movie</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

.container{
    width:350px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

input, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:#1a73e8;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#155bc0;
}

.stars span{
    font-size:22px;
    cursor:pointer;
    color:lightgray;
}

.movie-item{
    background:#f1f1f1;
    border:1px solid #ddd;
    padding:12px;
    border-radius:8px;
    margin-top:10px;
    font-size:16px;
}

.movie-stars{
    color:gold;
    margin-left:5px;
}
</style>

</head>
<body>

<div class="container">

<h2>Add a Movie</h2>

<label>Title:</label>
<input type="text" id="title">

<label>Year:</label>
<input type="number" id="year">

<label>Genre:</label>
<select id="genre">
<option>Action</option>
<option>Comedy</option>
<option>Drama</option>
<option>Horror</option>
<option>Romance</option>
<option>Sci-Fi</option>
</select>

<label>Rating:</label>
<div class="stars" id="stars">
<span data-value="1">★</span>
<span data-value="2">★</span>
<span data-value="3">★</span>
<span data-value="4">★</span>
<span data-value="5">★</span>
</div>

<br><br>

<button onclick="addMovie()">Add Movie</button>

<h3 style="text-align:center">Movie List</h3>
<div id="movieList"></div>

</div>

<script>

let rating = 0

// STAR CLICK FUNCTION
const stars = document.querySelectorAll("#stars span")

stars.forEach(star => {
    star.addEventListener("click", () => {
        rating = star.dataset.value

        stars.forEach(s => s.style.color="lightgray")

        for(let i=0;i<rating;i++){
            stars[i].style.color="gold"
        }
    })
})

// LOAD MOVIES FROM LOCALSTORAGE
let movies = JSON.parse(localStorage.getItem("movies")) || []

displayMovies()

function addMovie(){

let title = document.getElementById("title").value
let year = document.getElementById("year").value
let genre = document.getElementById("genre").value

if(title=="" || year=="" || rating==0){
    alert("Please complete the form")
    return
}

let movie = {
    title:title,
    year:year,
    genre:genre,
    rating:rating
}

movies.push(movie)

localStorage.setItem("movies", JSON.stringify(movies))

displayMovies()

clearForm()
}

function displayMovies(){

let list = document.getElementById("movieList")
list.innerHTML=""

movies.forEach(movie => {

let starsDisplay = "★".repeat(movie.rating)

list.innerHTML += `
<div class="movie-item">
${movie.title} (${movie.year}) - ${movie.genre}, Rating:
<span class="movie-stars">${starsDisplay}</span>
</div>
` })
}

function clearForm(){
document.getElementById("title").value=""
document.getElementById("year").value=""
rating=0
stars.forEach(s => s.style.color="lightgray")
}

</script>

</body>
</html>
